services:
  postgres-test:
    image: 'postgres:15'
    environment:
      - 'POSTGRES_DB=notification_test'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d notification_test"]
      interval: 10s
      timeout: 5s
      retries: 5
