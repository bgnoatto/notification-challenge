services:
  db:
    image: 'postgres:15'
    environment:
      - 'POSTGRES_DB=notification'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d notification"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - '8080:8080'
    environment:
      - DB_HOST=postgres
      - DB_NAME=notification
      - DB_USER=myuser
      - DB_PASSWORD=secret
      - SPRING_DOCKER_COMPOSE_ENABLED=false
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
