spring.application.name=notification-challenge

pokeapi.base-url=https://pokeapi.co/api/v2

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:notification}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:secret}

spring.jpa.hibernate.ddl-auto=update
server.error.include-stacktrace=never
server.error.include-message=always

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger/api
springdoc.api-docs.path=/swagger/docs

logging.file.name=logs/notification-challenge.log
logging.logback.rollingpolicy.file-name-pattern=logs/notification-challenge-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
