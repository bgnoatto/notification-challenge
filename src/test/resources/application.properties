spring.docker.compose.enabled=false
pokeapi.base-url=https://pokeapi.co/api/v2
spring.jpa.hibernate.ddl-auto=create-drop
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWJ5dGVz}
jwt.expiration-ms=86400000
# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9093}
spring.kafka.listener.auto-startup=false
spring.kafka.admin.properties.request.timeout.ms=1000
spring.kafka.admin.properties.default.api.timeout.ms=1000
spring.kafka.admin.properties.retries=0
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=bgn.source.notification.model
notification.topic.name=notifications